name: CI Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run all tests
        run: npm test -- --runInBand

      - name: Run tests with coverage
        run: npm run test:coverage -- --runInBand

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
